<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Page Cycler</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            overflow: hidden;
            background: black;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
        #loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-family: Arial, sans-serif;
            z-index: 9999;
        }
    </style>
</head>
<body>
    <div id="loading">Loading...</div>
    <iframe id="pageCycler" src="" allowfullscreen></iframe>
    <script>
        const pages = [
            'index2.html',
            'Calendar-Week.html',
            'ChoresTV.html',
            'Sticky%20Notes.html'
        ];

        let currentIndex = 0;
        const iframe = document.getElementById('pageCycler');
        const loading = document.getElementById('loading');

        function cyclePages() {
            iframe.src = pages[currentIndex];
            currentIndex = (currentIndex + 1) % pages.length;
        }

        // Change page every 30 seconds
        setInterval(cyclePages, 30000);
        
        // Hide loading message when iframe loads
        iframe.onload = function() {
            loading.style.display = 'none';
        };
        
        // Load initial page
        cyclePages();
    </script>
</body>
</html>
