name: Deploy to GitHub Pages with API Key Injection

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Setup Pages
      uses: actions/configure-pages@v4
    
    - name: Inject API Key
      env:
        GOOGLE_CALENDAR_API_KEY: ${{ secrets.GOOGLE_CALENDAR_API_KEY }}
      run: |
        sed -i "s|PLACEHOLDER_API_KEY_FROM_SECRETS|${GOOGLE_CALENDAR_API_KEY}|g" index.html
        sed -i "s|PLACEHOLDER_API_KEY_FROM_SECRETS|${GOOGLE_CALENDAR_API_KEY}|g" index2.html
        sed -i "s|PLACEHOLDER_API_KEY_FROM_SECRETS|${GOOGLE_CALENDAR_API_KEY}|g" Calendar-Week.html
    
    - name: Create .nojekyll
      run: touch .nojekyll
    
    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: '.'
    
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
