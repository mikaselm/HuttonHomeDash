name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Inject API Key and Deploy
      env:
        GOOGLE_CALENDAR_API_KEY: ${{ secrets.GOOGLE_CALENDAR_API_KEY }}
      run: |
        # Replace placeholder with actual API key from GitHub Secrets
        sed -i "s/PLACEHOLDER_API_KEY_FROM_SECRETS/${GOOGLE_CALENDAR_API_KEY}/g" index.html
        sed -i "s/PLACEHOLDER_API_KEY_FROM_SECRETS/${GOOGLE_CALENDAR_API_KEY}/g" index2.html
        sed -i "s/PLACEHOLDER_API_KEY_FROM_SECRETS/${GOOGLE_CALENDAR_API_KEY}/g" Calendar-Week.html
    
    - name: Create .nojekyll to prevent GitHub Pages processing
      run: touch .nojekyll
    
    - name: Create cache control headers
      run: |
        cat > _headers << 'EOF'
        /*
          Cache-Control: public, max-age=300
        
        /*.html
          Cache-Control: public, max-age=0, must-revalidate
        
        /index.html
          Cache-Control: public, max-age=0, must-revalidate
        
        /index2.html
          Cache-Control: public, max-age=0, must-revalidate
        
        /Calendar-Week.html
          Cache-Control: public, max-age=0, must-revalidate
        
        /*.js
          Cache-Control: public, max-age=3600
        
        /*.css
          Cache-Control: public, max-age=3600
        EOF
    
    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./
